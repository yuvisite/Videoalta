worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Local Videoalta site:
    # - nginx listens on videoalta.lcl
    # - videoalta.local is kept as a compatibility alias and redirects to .lcl
    # - requests are proxied to the local Node app on 127.0.0.1:8787
    # - root redirects to /video/ because this repo's video app lives there
    server {
        listen       80;
        server_name  videoalta.lcl;

        location = / {
            return 302 /video/;
        }

        location / {
            proxy_pass http://127.0.0.1:8787;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen       80;
        server_name  videoalta.local;
        return 301 http://videoalta.lcl$request_uri;
    }
    
    server {
        listen       443 ssl;
        server_name  youvi.moe;
        
        ssl_certificate      youvi.moe+3.pem;
        ssl_certificate_key  youvi.moe+3-key.pem;
        
        # Главная страница -> youvi_main.html
        location = / {
            rewrite ^ /youvi_main.html break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # /admin -> index.html (без префикса youvi_)
        location = /admin {
            rewrite ^ /index.html break;
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Редирект с /youvi_* на /* без .html
        location ~ ^/youvi_(.+)\.html?$ {
            return 301 /$1$is_args$args;
        }
        
        location / {
            # Добавляем префикс youvi_ и .html для путей без расширения
            if ($request_uri ~ ^/([a-zA-Z0-9_-]+)(\?.*)?$) {
                rewrite ^/([a-zA-Z0-9_-]+)(.*)$ /youvi_$1.html$2 break;
            }
            
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
    
    server {
        listen       80;
        server_name  youvi.moe;
        return 301 https://$server_name$request_uri;
    }
}
